<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface One UI Space</title>
    <style>
        :root {
            --bg-color: #000000;
            --samsung-blue: #3e8ede;
            /* Simulation de la police SamsungOne */
            --font-one-ui: "SamsungOne", "Segoe UI", "Roboto", sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            color: white;
            font-family: var(--font-one-ui);
            overflow: hidden;
        }

        /* --- FOND ÉTOILÉ --- */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        /* Simulation d'étoiles statiques */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
        }

        /* --- BIENVENUE (FADE IN/OUT) --- */
        #welcome-screen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            z-index: 100;
            animation: fadeOutMain 4s forwards ease-in-out;
        }

        .welcome-text {
            font-size: 3rem;
            letter-spacing: 20px;
            text-transform: uppercase;
            font-weight: 200;
            animation: fadeInWelcome 2s forwards;
        }

        @keyframes fadeInWelcome { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOutMain { 80% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* --- CHARGEMENT --- */
        #loader-screen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            z-index: 90;
            opacity: 0;
            animation: loaderSequence 3s forwards 4s;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--samsung-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes loaderSequence { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- INTERFACE FINALE --- */
        #ui-layer {
            height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: fadeInUI 1s forwards 7.5s;
        }

        @keyframes fadeInUI { to { opacity: 1; } }

        /* Coin Camembert Haut Droite */
        .corner-badge {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom-left-radius: 100%; /* Forme camembert/quart de rond */
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .coming-soon {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(0deg);
            margin-left: 20px;
            margin-bottom: 20px;
        }

        /* Barre des tâches volante en bas */
        .bottom-nav {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            padding: 18px 50px;
            border-radius: 100px;
            display: flex;
            gap: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .nav-item {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-item:hover {
            opacity: 1;
            transform: scale(1.1);
            color: var(--samsung-blue);
        }

    </style>
</head>
<body>

    <div class="space-bg">
        <div class="stars"></div>
    </div>

    <div id="welcome-screen">
        <div class="welcome-text">WELCOME</div>
    </div>

    <div id="loader-screen">
        <div class="loader"></div>
    </div>

    <div id="ui-layer">
        <div class="corner-badge">
            <span class="coming-soon">Coming Soon...</span>
        </div>

        <div class="bottom-nav">
            <div class="nav-item">FILMS</div>
            <div class="nav-item">SERIES</div>
            <div class="nav-item">EN DIRECT</div>
        </div>
    </div>

</body>
</html>
