<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Navigation Windows 12 - Samsung Style</title>
    <style>
        :root {
            --bg: #000;
            --win-blue: #0078d4;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FOND ESPACE --- */
        .space {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 100%);
            z-index: -1;
        }

        /* --- BIENVENUE (3 SECONDES) --- */
        #welcome {
            text-align: center;
            animation: fadeOut 0.8s ease-in 3s forwards;
        }

        .welcome-text {
            font-size: 5rem;
            font-weight: 100;
            letter-spacing: 20px;
            background: linear-gradient(90deg, #fff, #0078d4, #fff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200%; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- MENU SELECTION --- */
        #menu {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            opacity: 0;
            transition: opacity 1s;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Focus Souris & TV */
        .item:hover, .item:focus {
            background: rgba(0, 120, 212, 0.3);
            border-color: var(--win-blue);
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 120, 212, 0.5);
            outline: none;
        }
    </style>
</head>
<body>

    <div class="space"></div>

    <div id="welcome">
        <h1 class="welcome-text">WELCOME</h1>
    </div>

    <div id="menu">
        <h1 style="margin-bottom: 50px; font-weight: 200; letter-spacing: 5px;">SÉLECTION DE CHAPITRE</h1>
        <div class="grid" id="chapter-grid"></div>
    </div>

    <script>
        /* --- CONFIGURATION DES LIENS ICI --- */
        const mesChapitres = [
            { nom: "Chapitre 1", url: "https://tropistream.fr/watch/bW92aWU6NjcxOjUwNDk5NWQ0OWEzN2U2MjkzNzQ5N2MyNmYwZDJiYzU3Mjc2NTRkNGZhYzU1OWZkZjcxZDc1ZjljMWRlMTgyYmM?l=VF" },
            { nom: "Chapitre 2", url: "https://tropistream.fr/watch/bW92aWU6NjcyOjhkN2YyOGUyZTljZDgyOWRhMWJjZTJiMzdjOWUxNzY0YjUxNjQ3NTBiYjA2NTQyZjAyZGZhYjRhMmRjMWUzOTU?l=VF" },
            { nom: "Chapitre 3", url: "https://tropistream.fr/watch/bW92aWU6NjczOmZmMGM4ZWYxYjE2MGJkM2ViMzc4NmYxMTg2ZDlkYjU3N2YwNWYwYzFhZWYyOTQ5NzMzNzQyNDVkODc5NmRlNDg?l=VF" },
        ];

        const grid = document.getElementById('chapter-grid');
        const welcome = document.getElementById('welcome');
        const menu = document.getElementById('menu');

        // Génération des boutons
        mesChapitres.forEach((ch, index) => {
            const a = document.createElement('a');
            a.href = ch.url;
            a.className = 'item';
            a.innerText = ch.nom;
            a.tabIndex = 0; // Pour la télécommande
            grid.appendChild(a);
        });

        // Switch écran
        setTimeout(() => {
            welcome.style.display = 'none';
            menu.style.display = 'flex';
            setTimeout(() => menu.style.opacity = "1", 50);
            document.querySelector('.item').focus(); // Focus direct pour TV
        }, 3800);

        // Navigation Télécommande (Haut, Bas, Gauche, Droite)
        let currentIdx = 0;
        const items = document.querySelectorAll('.item');

        document.addEventListener('keydown', (e) => {
            const cols = Math.floor(grid.offsetWidth / 270); 
            if (e.key === "ArrowRight") currentIdx = (currentIdx + 1) % items.length;
            if (e.key === "ArrowLeft") currentIdx = (currentIdx - 1 + items.length) % items.length;
            if (e.key === "ArrowDown") if (currentIdx + cols < items.length) currentIdx += cols;
            if (e.key === "ArrowUp") if (currentIdx - cols >= 0) currentIdx -= cols;
            
            items[currentIdx].focus();
        });
    </script>
</body>
</html>
