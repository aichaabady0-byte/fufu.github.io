<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion à Roblox</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Image de fond */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://wallpapers.com/images/hd/roblox-game-collage-8j17h2f97iqhzyj8.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-container {
            background-color: rgba(30, 31, 33, 0.95);
            width: 400px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #393b3d;
            color: white;
        }

        button {
            width: 100%;
            background-color: #393b3d; /* Version grise pour correspondre au design */
            color: white;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #4a4d50;
        }

        .btn-secondary {
            background-color: #4a4d50;
            border: none;
            margin: 5px 0;
        }

        .forgot-link {
            display: block;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            margin: 10px 0 20px 0;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .signup-text {
            margin-top: 20px;
            font-size: 14px;
            color: #ddd;
        }

        .signup-text a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        hr {
            border: 0.5px solid #444;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Connexion à Roblox</h2>
    
    <input type="text" placeholder="Identifiant/E-mail/Téléphone">
    <input type="password" placeholder="Mot de passe">
    
    <button>Connexion</button>
    
    <a href="#" class="forgot-link">Mot de passe ou nom d'utilisateur oublié ?</a>
    
    <hr>

    <button class="btn-secondary">Envoyez-moi un code unique par email</button>
    <button class="btn-secondary">Connexion rapide</button>
    
    <div class="signup-text">
        Vous n'avez pas de compte ? <a href="#">S'inscrire</a>
    </div>
</div>

</body>
</html>
